version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Install dependencies
        - npm ci --cache .npm --prefer-offline
        
        # Verify required environment variables exist
        - |
          echo "🔍 Checking environment variables..."
          if [ -z "$BEDROCK_ACCESS_KEY_ID" ]; then
            echo "⚠️  Warning: BEDROCK_ACCESS_KEY_ID not set"
          fi
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "⚠️  Warning: OPENAI_API_KEY not set"
          fi
          echo "✅ Environment check complete"
    build:
      commands:
        # Log environment variables (without values for security)
        - env | grep -E '^(BEDROCK_|OPENAI_|GOOGLE_|MISTRAL_|HUGGINGFACE_|NEXT_PUBLIC_)' | cut -d'=' -f1 || true
        
        # Build Next.js application
        - echo "🏗️  Building Next.js application..."
        - npm run build
        
        # Verify build output
        - |
          if [ -d ".next" ]; then
            echo "✅ Build successful - .next directory created"
          else
            echo "❌ Build failed - .next directory not found"
            exit 1
          fi
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*